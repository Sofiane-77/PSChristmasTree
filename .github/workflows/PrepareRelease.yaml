name: Prepare PSChristmasTree Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version component to increment"
        required: true
        type: choice
        default: "Revision"
        options:
          - Major
          - Minor
          - Build
          - Revision

jobs:
  prepare-release:
    name: Bump version and open PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      CI_COMMIT_AUTHOR: github-actions[bot]
      CI_COMMIT_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Compute and apply new version
        id: versioning
        shell: pwsh
        run: |
          $manifestPath = 'PSChristmasTree/PSChristmasTree.psd1'
          $content = Get-Content -Raw $manifestPath

          $match = [regex]::Match($content, "(?<=ModuleVersion\s*=\s*')[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+")
          if (-not $match.Success) {
            throw 'Could not parse ModuleVersion from PSChristmasTree.psd1.'
          }

          $current  = [version]$match.Value
          $major    = $current.Major
          $minor    = $current.Minor
          $build    = $current.Build
          $revision = $current.Revision

          switch ('${{ inputs.bump_type }}') {
            'Major'    { $major++;    $minor = 0; $build = 0; $revision = 0 }
            'Minor'    { $minor++;    $build = 0; $revision = 0 }
            'Build'    { $build++;    $revision = 0 }
            'Revision' { $revision++ }
          }

          $newVersion = "$major.$minor.$build.$revision"
          $newContent = [regex]::Replace(
            $content,
            "(?<=ModuleVersion\s*=\s*')[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+",
            $newVersion,
            1
          )
          Set-Content -Path $manifestPath -Value $newContent -Encoding UTF8 -NoNewline

          "new_version=$newVersion" >> $env:GITHUB_OUTPUT
          "tag_name=v$newVersion"   >> $env:GITHUB_OUTPUT
          Write-Host "Version bumped: $($current) → $newVersion"

      - name: Configure Git
        shell: pwsh
        run: |
          git config --local user.name  "${{ env.CI_COMMIT_AUTHOR }}"
          git config --local user.email "${{ env.CI_COMMIT_EMAIL }}"

      - name: Create release branch and commit version bump
        shell: pwsh
        run: |
          $branchName = "release/bump-v${{ steps.versioning.outputs.new_version }}"
          git checkout -b $branchName
          git add PSChristmasTree/PSChristmasTree.psd1
          git commit -m ":bookmark: Prepare release v${{ steps.versioning.outputs.new_version }}"
          "branch_name=$branchName" >> $env:GITHUB_OUTPUT
        id: release_branch

      - name: Push release branch
        shell: pwsh
        run: |
          git push --set-upstream origin "${{ steps.release_branch.outputs.branch_name }}"

      - name: Open pull request to main
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.release_branch.outputs.branch_name }}" \
            --title ":bookmark: Prepare release v${{ steps.versioning.outputs.new_version }}" \
            --body "This PR bumps ModuleVersion to v${{ steps.versioning.outputs.new_version }}.\n\nAfter merge to main, create and push tag ${{ steps.versioning.outputs.tag_name }} to trigger the release workflow."
